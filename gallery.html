<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Official Media Gallery | Go Green Coin</title>

<meta name="description" content="Official Media Gallery of Go Green Coin. Browse our latest images, videos, campaigns and community activities.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#07140e;
color:#ffffff;
line-height:1.8;
}

a{
text-decoration:none;
color:#8dfc53;
}

header{
background:linear-gradient(135deg,#0b3d20,#0d6f3a);
padding:80px 20px;
text-align:center;
border-bottom:3px solid #18d45d;
}

.logo{
width:160px;
height:160px;
border-radius:50%;
border:5px solid #2cff71;
box-shadow:0 0 40px #00ff88;
margin-bottom:20px;
}

.hero-badge{
display:inline-block;
background:#18d45d;
color:#07140e;
padding:10px 20px;
border-radius:40px;
font-weight:700;
margin-bottom:20px;
}

h1{
font-size:52px;
font-weight:800;
margin-bottom:10px;
}

.subtitle{
font-size:24px;
font-weight:600;
color:#b7ff6b;
margin-bottom:20px;
}

.description{
max-width:900px;
margin:auto;
font-size:19px;
color:#dddddd;
}

nav{
background:#0b2416;
padding:18px;
display:flex;
justify-content:center;
gap:22px;
flex-wrap:wrap;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #18d45d;
}

nav a{
color:white;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:#8dfc53;
}

.container{
width:95%;
max-width:1250px;
margin:auto;
padding:60px 0;
}

.card{
background:#11291b;
padding:35px;
border-radius:20px;
margin-bottom:35px;
border:1px solid #1f6a3d;
box-shadow:0 0 20px rgba(0,255,120,.12);
}

h2{
font-size:34px;
color:#8dfc53;
margin-bottom:20px;
}

.btn{
display:inline-block;
background:#16b84e;
padding:14px 28px;
border-radius:12px;
font-weight:bold;
margin-top:25px;
color:white;
transition:.3s;
}

.btn:hover{
background:#1fdd61;
transform:translateY(-3px);
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.gallery-item{
background:#143822;
border-radius:18px;
overflow:hidden;
transition:.3s;
}

.gallery-item:hover{
transform:translateY(-6px);
}

.gallery-item img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.gallery-caption{
padding:18px;
text-align:center;
font-weight:600;
}

@media(max-width:768px){

.logo{
width:120px;
height:120px;
}

h1{
font-size:36px;
}

.subtitle{
font-size:20px;
}

.description{
font-size:17px;
}

}

</style>

</head>
